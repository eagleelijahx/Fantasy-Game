name: C++ CI/CD with Allegro 5 (Windows Native Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up MSYS2 (Compiler & Allegro 5)
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-allegro5

    - name: Compile Game for Windows (.exe)
      shell: msys2 {0}
      run: |
        g++ -std=c++17 *.cpp -o FantasyGame.exe \
          -lallegro \
          -lallegro_main \
          -lallegro_image \
          -lallegro_audio \
          -lallegro_acodec \
          -lallegro_font \
          -lallegro_ttf \
          -lallegro_primitives \
          -lallegro_dialog

    # === CONTINUOUS DELIVERY (CD) COMPONENT ===
    # This grabs your fresh .exe and wraps it with your exact files from the repository
    - name: Upload Windows Game Bundle
      uses: actions/upload-artifact@v4
      with:
        name: FantasyGame-Windows-Build
        path: |
          FantasyGame.exe
          allegro_monolith-5.2.dll
          *.ttf
          *.png
          *.wav
